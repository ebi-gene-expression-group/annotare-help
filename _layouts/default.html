<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Accepted raw microarray files formats &lt; Guide &lt; Annotare &lt; EMBL-EBI</title>
    <link rel="stylesheet" href="https://ebi.emblstatic.net/web_guidelines/EBI-Framework/v1.3/css/ebi-global.css" type="text/css" media="all" />
    <link rel="stylesheet" href="https://ebi.emblstatic.net/web_guidelines/EBI-Framework/v1.3/css/ebi-global.min.css" type="text/css" media="all"/>
    <link rel="stylesheet" href="https://ebi.emblstatic.net/web_guidelines/EBI-Icon-fonts/v1.3/fonts.css" type="text/css" media="all"/>

    <link rel="stylesheet" href="../css/annotare_help_style.css ">
</head>

<body>
<div class="row">
    {{ content }}
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.2.1/iframeResizer.contentWindow.min.js"></script>

<!-- Scripts from the EMBL-EBI foundation framework v1.3 -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script defer="defer" src="https://ebi.emblstatic.net/web_guidelines/EBI-Framework/v1.3/js/script.js"></script>
<script src="https://ebi.emblstatic.net/web_guidelines/EBI-Framework/v1.3/libraries/foundation-6/js/foundation.js"></script>
<script src="https://ebi.emblstatic.net/web_guidelines/EBI-Framework/v1.3/js/foundationExtendEBI.js"></script>
<script type="text/JavaScript">$(document).foundation();</script>
<script type="text/JavaScript">$(document).foundationExtendEBI();</script>
<script type="text/javascript">
    // Since script.js is deferred, we call the function as soon as possible
    // after the window (and deferred scripts) are ready
    window.addEventListener('load', function() {
        if (typeof closeDataProtectionBanner === 'function') {
            closeDataProtectionBanner();
        }
    });

    /**
     * Re-triggerable slide-down animation for <details> elements.
     * Uses Web Animations API for high performance and reliability.
     */
    document.addEventListener('DOMContentLoaded', () => {
        const detailsElements = document.querySelectorAll('details');
        
        detailsElements.forEach((details) => {
            const summary = details.querySelector('summary');
            const content = details.querySelector('.details-content');

            if (!summary || !content) return;

            summary.addEventListener('click', (e) => {
                // Prevent the browser from toggling 'open' immediately
                e.preventDefault();

                if (details.open) {
                    // Start closing animation
                    const startHeight = content.offsetHeight;
                    const anim = content.animate([
                        { height: `${startHeight}px`, opacity: 1, transform: 'translateY(0)' },
                        { height: '0px', opacity: 0, transform: 'translateY(-10px)' }
                    ], { duration: 300, easing: 'ease-in-out' });

                    anim.onfinish = () => {
                        details.open = false;
                        // Reset style for next open
                        content.style.height = '';
                    };
                } else {
                    // Open the details first so we can measure scrollHeight
                    details.open = true;
                    const targetHeight = content.scrollHeight;

                    // Start opening animation
                    const anim = content.animate([
                        { height: '0px', opacity: 0, transform: 'translateY(-10px)' },
                        { height: `${targetHeight}px`, opacity: 1, transform: 'translateY(0)' }
                    ], { duration: 300, easing: 'ease-in-out' });

                    anim.onfinish = () => {
                        // After opening, remove fixed height to handle window resizing
                        content.style.height = '';
                    };
                }
            });
        });

        /**
         * Logic to open <details> based on URL hash (deep links).
         * Enhanced for robust behavior in iframes.
         */
        const handleHashChange = () => {
            const hash = window.location.hash;
            if (!hash) return;

            // Use decodeURIComponent to handle special characters in hash
            const targetId = decodeURIComponent(hash.substring(1));
            
            const attemptOpening = () => {
                const target = document.getElementById(targetId);
                if (!target) return false;

                // Find all ancestor <details> and open them
                let ancestor = target.parentElement;
                while (ancestor) {
                    if (ancestor.tagName.toLowerCase() === 'details') {
                        ancestor.open = true;
                    }
                    ancestor = ancestor.parentElement;
                }

                // If the target itself is a <details>, open it
                if (target.tagName.toLowerCase() === 'details') {
                    target.open = true;
                }

                // Scroll to target after a short delay to ensure layout is updated
                setTimeout(() => {
                    target.scrollIntoView({ behavior: 'smooth' });
                    // After opening/scrolling, notify parent of height change again just in case
                    if (window.parent !== window) {
                        window.parent.postMessage({ type: 'iframe-resize', height: document.documentElement.scrollHeight }, '*');
                    }
                }, 200);
                return true;
            };

            // Try immediately
            if (!attemptOpening()) {
                // If target not found yet, it might be due to iframe loading/rendering timing.
                // Try a few more times.
                let attempts = 0;
                const interval = setInterval(() => {
                    attempts++;
                    if (attemptOpening() || attempts > 5) {
                        clearInterval(interval);
                    }
                }, 300);
            }
        };

        // Run on various events to ensure it catches the hash in an iframe
        handleHashChange();
        window.addEventListener('hashchange', handleHashChange);
        window.addEventListener('load', handleHashChange);

        // Listen for messages from the parent window that might trigger a hash change
        window.addEventListener('message', (event) => {
            // Some parent apps might send a new hash via postMessage
            if (event.data && event.data.type === 'navigate' && event.data.hash) {
                window.location.hash = event.data.hash;
            } else if (typeof event.data === 'string' && event.data.startsWith('#')) {
                window.location.hash = event.data;
            }
        });
    });
    // Create an observer that reports the new height whenever the content size changes
    const resizeObserver = new ResizeObserver(() => {
        // Get the full scrollable height of the document
        const newHeight = document.documentElement.scrollHeight;

        // Send a message to the parent window with the new height
        // Note: '*' allows any parent to receive this, replace with your web app's domain for better security (e.g., 'https://your-app.ebi.ac.uk')
        window.parent.postMessage({ type: 'iframe-resize', height: newHeight }, '*');
    });

    // Start observing the body for size changes
    resizeObserver.observe(document.body);
</script>
</body>
</html>
